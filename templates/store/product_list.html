{% extends 'base.html' %}
{% load static %}

{% block title %}Produse - ZypronTech{% endblock %}

{% block content %}
<section>
    <h3>Produse</h3>
    <div class="grid">
        {% for product in products %}
            <div class="card">
                <img src="{% static product.main_image %}" alt="{{ product.name }}">
                <h4>{{ product.name }}</h4>
                <p>{{ product.price }}</p>
                <a class="btn small" href="{% url 'store:product_detail' product.slug %}">Detalii</a>
            </div>
        {% empty %}
            <p>There are no products yet.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
