{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ZypronTech{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <div class="container header-wrap">
            <div class="brand">
                <a href="{% url 'store:home' %}" class="brand-link">
                    <img src="{% static 'images/WhatsApp Image 2026-03-09 at 8.08.54 PM.jpeg' %}" alt="ZypronTech Logo" class="site-logo">
                    <div class="brand-text">
                        <span class="brand-name">ZypronTech</span>
                        <span class="brand-tagline">Power • Performance • Precision</span>
                    </div>
                </a>
            </div>

            <nav class="main-nav">
                <a href="{% url 'store:home' %}" class="active">Home</a>
                <a href="{% url 'store:product_list' %}">Products</a>
                <a href="/admin/">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>© 2026 ZypronTech — Power • Performance • Precision</p>
        </div>
    </footer>
</body>
</html>
